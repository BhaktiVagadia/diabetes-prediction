<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <!-- Injecting your design tokens into Tailwind CDN config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#1d4ed8', /* Professional dark blue for prediction buttons */
                            medium: '#3b82f6',
                            strong: '#1e40af'
                        },
                        heading: '#0f172a',
                        body: '#334155',
                        default: {
                            DEFAULT: '#cbd5e1',
                            medium: '#94a3b8'
                        },
                        neutral: {
                            'primary-soft': '#f8fafc',
                            'secondary-medium': '#f1f5f9',
                            'tertiary-medium': '#e2e8f0',
                            'tertiary': '#94a3b8',
                            'tertiary-soft': '#f8fafc'
                        },
                        success: {
                            DEFAULT: '#15803d',
                            medium: '#22c55e',
                            strong: '#166534'
                        },
                        danger: {
                            DEFAULT: '#b91c1c',
                            medium: '#ef4444',
                            strong: '#991b1b'
                        },
                        warning: {
                            DEFAULT: '#b45309',
                            medium: '#f59e0b',
                            strong: '#854d0e'
                        },
                        dark: {
                            DEFAULT: '#1e293b',
                            strong: '#0f172a'
                        }
                    },
                    borderRadius: {
                        'base': '0.5rem'
                    }
                }
            }
        }
    </script>
    <style>
        /* Linear gradient color match directly matching image_1b0bc1.png from left to right */
        .exact-gradient-bg {
            background: linear-gradient(to right, #71aed8, #a4e2d3);
        }
    </style>
</head>
<body class="exact-gradient-bg min-h-screen flex items-center justify-center p-4 font-sans antialiased text-body">

    <!-- Clean white card container to match the standalone input look from image_1b0bc1.png -->
    <!-- Main Centered Container -->
    <div class="w-full max-w-xl bg-white p-8 rounded-xl shadow-xl border border-slate-100 my-8">

        <!-- WRAPPER 1: Form View (Visible by default) -->
        <div id="form-view">
            <h1 class="text-2xl font-bold text-center mb-8 text-heading tracking-tight">Diabetes Prediction Form</h1>

            <form id="prediction-form" class="w-full space-y-5">
                <div>
                    <label for="pregnancies" class="block mb-2 text-sm font-semibold text-slate-700">Pregnancies:</label>
                    <input type="number" id="pregnancies" name="Pregnancies" placeholder="e.g., 6" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div>
                    <label for="glucose" class="block mb-2 text-sm font-semibold text-slate-700">Glucose (mg/dL):</label>
                    <input type="number" id="glucose" name="Glucose" placeholder="e.g., 148" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div>
                    <label for="blood-pressure" class="block mb-2 text-sm font-semibold text-slate-700">Blood Pressure (mm Hg):</label>
                    <input type="number" id="blood-pressure" name="BloodPressure" placeholder="e.g., 72" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div>
                    <label for="skin-thickness" class="block mb-2 text-sm font-semibold text-slate-700">Skin Thickness (mm):</label>
                    <input type="number" id="skin-thickness" name="SkinThickness" placeholder="e.g., 35" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div>
                    <label for="insulin" class="block mb-2 text-sm font-semibold text-slate-700">Insulin (μU/mL):</label>
                    <input type="number" id="insulin" name="Insulin" placeholder="e.g., 0" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div>
                    <label for="bmi" class="block mb-2 text-sm font-semibold text-slate-700">BMI (Weight in kg/m²):</label>
                    <input type="number" id="bmi" name="BMI" step="0.1" placeholder="e.g., 33.6" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div>
                    <label for="dpf" class="block mb-2 text-sm font-semibold text-slate-700">Diabetes Pedigree Function:</label>
                    <input type="number" id="dpf" name="DiabetesPedigreeFunction" step="0.001" placeholder="e.g., 0.627" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <div class="mb-8">
                    <label for="age" class="block mb-2 text-sm font-semibold text-slate-700">Age (years):</label>
                    <input type="number" id="age" name="Age" placeholder="e.g., 50" class="bg-neutral-primary-soft border border-slate-200 text-heading text-sm rounded-base focus:ring-2 focus:ring-brand/30 focus:border-brand block w-full px-4 py-3 shadow-xs placeholder:text-slate-400 transition-all outline-none" required>
                </div>

                <button type="submit" class="w-full text-white bg-brand hover:bg-brand-strong focus:ring-4 focus:ring-brand/20 shadow-md shadow-brand/10 font-semibold leading-5 rounded-base text-sm px-4 py-3.5 focus:outline-none transition-all mt-4 transform active:scale-[0.99]">
                    Predict
                </button>
            </form>
        </div>

        <!-- WRAPPER 2: Prediction Result Screen (Hidden by default, mirrors image_1b12a3.png) -->
        <div id="result-view" class="hidden text-center py-4">
            <h2 class="text-3xl text-slate-800 font-normal tracking-wide mb-6">Prediction Result</h2>

            <!-- Health Result Indicator Badge -->
            <div class="flex items-center justify-center gap-3 text-2xl font-normal text-slate-800 mb-2">
                <span id="result-icon" class="text-3xl">🩸</span>
                <span id="result-label">Diabetic</span>
            </div>

            <!-- Calculated probability metrics output line -->
            <p class="text-slate-600 text-sm mb-8">
                Probability of being <span id="probability-context">diabetic</span>: <span id="result-probability" class="font-medium">0.00%</span>
            </p>

            <!-- Navigation back control -->
            <button id="go-back-btn" class="w-full text-white bg-slate-500 hover:bg-slate-600 font-normal rounded-base text-sm px-4 py-3 transition-colors outline-none focus:outline-none">
                Go Back
            </button>
        </div>

    </div>
    <script src="/static/script.js"></script>
</body>
</html>
